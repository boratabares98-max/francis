<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Francis</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.55);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.22);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 24px;
    }

    h1 {
      margin: 0;
      color: white;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
    }

    p {
      margin-top: 12px;
      color: rgba(255,255,255,0.9);
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      text-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    .basketball {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 28% 28%, #ffcf8a 0 10%, #f39a2e 11% 35%, #d86f11 36% 100%);
      border: 3px solid #2a1608;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
      z-index: 2;
      animation: floatBall linear forwards;
      overflow: hidden;
    }

    .basketball::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        linear-gradient(90deg,
          transparent 47%,
          #2a1608 47%,
          #2a1608 53%,
          transparent 53%),
        linear-gradient(0deg,
          transparent 47%,
          #2a1608 47%,
          #2a1608 53%,
          transparent 53%),
        radial-gradient(circle at -8% 50%, transparent 56%, #2a1608 57%, #2a1608 61%, transparent 62%),
        radial-gradient(circle at 108% 50%, transparent 56%, #2a1608 57%, #2a1608 61%, transparent 62%);
      opacity: 1;
    }

    .basketball::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      top: 14px;
      left: 16px;
    }

    @keyframes floatBall {
      0% {
        transform: translateY(110vh) translateX(0) rotate(0deg) scale(0.9);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      50% {
        transform: translateY(45vh) translateX(35px) rotate(180deg) scale(1);
      }
      100% {
        transform: translateY(-15vh) translateX(-35px) rotate(360deg) scale(0.95);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <video class="video-bg" autoplay loop muted playsinline>
    <source src="FRANCIS SLSEEP.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>Francis</h1>
    
  </div>

  <script>
    function createBasketball() {
      const ball = document.createElement('div');
      ball.className = 'basketball';
      ball.style.left = Math.random() * (window.innerWidth - 80) + 'px';
      ball.style.animationDuration = (Math.random() * 4 + 5) + 's';
      ball.style.opacity = Math.random() * 0.35 + 0.65;
      document.body.appendChild(ball);
      setTimeout(() => ball.remove(), 9500);
    }

    setInterval(createBasketball, 700);
  </script>
</body>
</html>
